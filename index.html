<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salma Yazki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Dawning+of+a+New+Day&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&family=Caveat:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F6F0E2;
            --bg2: #EDE5CE;
            --bg3: #E4D9BE;
            --ink: #1C1810;
            --muted: #8A7860;
            --border: #D0C4A4;
            --green: #4A7A52;
            --green-l: #C4D9C8;
            --blue: #4A6E8A;
            --blue-l: #C0D0DE;
            --amber: #A86E2A;
            --amber-l: #EDD8A8;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* hero */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) saturate(0.85);
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.3) 100%);
        }

        /* nav */
        .hero-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.5rem;
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Space Mono', serif;
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.65);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.65);
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: rgba(255, 255, 255, 1);
        }

        /* scroll hint */
        .hero-scroll {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 0.52rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            animation: nudge 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes nudge {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(5px);
            }
        }

        /* envelope wrapper */
        .envelope-wrap {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            margin-top: 140px;
        }

        @keyframes hintBob {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* envelope box */
        .envelope {
            position: relative;
            width: 420px;
            height: 260px;
            transition: transform 0.2s;
            overflow: visible;
        }

        .envelope:hover {
            transform: scale(1.02);
        }

        /* envelope body — the main cream rectangle */
        .env-body {
            position: absolute;
            inset: 0;
            background: #F2EAD4;
            border-radius: 3px;
            border: 1px solid #C8B898;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            z-index: 3;
        }

        /* stamp in the top right */
        .env-stamp {
            position: absolute;
            top: 12px;
            right: 14px;
            width: 36px;
            height: 44px;
            border: 1.5px solid #C8B898;
            background: var(--blue-l);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            z-index: 2;
        }

        .env-stamp::before {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px dashed rgba(74, 110, 138, 0.4);
        }

        /* handwritten address */
        .env-address {
            position: absolute;
            bottom: 22px;
            left: 20px;
            z-index: 2;
        }

        .env-address-line {
            font-family: 'Dawning of a New Day', cursive;
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
        }

        /* the triangular flap on top */
        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 0;
            border-left: 210px solid transparent;
            border-right: 210px solid transparent;
            border-top: 110px solid #E8DECA;
            z-index: 4;
            transform-origin: top center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.08));
        }

        .envelope .env-flap {
            animation: openFlap 1s ease 1.5s forwards;
        }

        @keyframes openFlap {
            from {
                transform: rotateX(0deg);
            }

            to {
                transform: rotateX(180deg);
            }
        }

        /* postcard — hidden inside envelope until flap opens */
        .postcard {
            position: absolute;
            width: 380px;
            height: 220px;
            background: #FDFAF3;
            border: 1px solid #D8CCAA;
            border-radius: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%) translateY(0px);
            z-index: 2;
            display: grid;
            grid-template-columns: 0.9fr 1fr;
            overflow: hidden;
            opacity: 0;
            animation: slideOut 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 2.3s forwards;
            clip-path: inset(0);
        }

        @keyframes slideOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(-240px);
            }
        }

        /* your photo on the left */
        .postcard-photo {
            background-image: url('me.jpeg');
            background-size: cover;
            background-position: center top;
            filter: sepia(15%) saturate(0.9) brightness(0.95);
            position: relative;
        }

        .postcard-photo::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(74, 122, 82, 0.12) 0%, transparent 60%);
        }

        .postcard-photo-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            font-family: 'Dawning of a New Day', cursive;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        /* right side */
        .postcard-right {
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 1px solid #D8CCAA;
        }

        .postcard-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .postcard-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.6rem;
            color: #8A7860;
            letter-spacing: 0.06em;
        }

        .postcard-stamp {
            width: 28px;
            height: 34px;
            border: 1px solid #D0C4A4;
            background: #C0D0DE;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            position: relative;
            flex-shrink: 0;
        }

        .postcard-stamp::before {
            content: '';
            position: absolute;
            inset: 2px;
            border: 1px dashed rgba(74, 110, 138, 0.4);
        }

        .postcard-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 300;
            color: #1C1810;
            line-height: 1.1;
        }

        .postcard-name em {
            font-style: italic;
            color: #A86E2A;
        }

        .postcard-title {
            font-family: 'Space Mono', monospace;
            font-size: 0.38rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8A7860;
            margin-top: 0.3rem;
            line-height: 1.8;
        }

        .postcard-greeting {
            font-family: 'Dawning of a New Day', cursive;
            font-size: 0.95rem;
            color: #4A7A52;
        }

        .postcard-lines {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .postcard-line {
            height: 1px;
            background: #D0C4A4;
        }
    </style>
</head>

<body>
    <!-- HERO -->
    <section class="hero" id="home">
        <div class="hero-bg"></div>

        <nav class="hero-nav">
            <div class="nav-logo">Salma Yazki</div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <div class="envelope-wrap" id="envelopeWrap">
            <div class="envelope" id="envelope">
                <!-- postcard slides out from inside -->
                <div class="postcard">
                    <div class="postcard-photo">
                        <span class="postcard-photo-label">Vancouver, BC</span>
                    </div>
                    <div class="postcard-right">
                        <div class="postcard-top">
                            <div class="postcard-label">Postcard</div>
                            <div class="postcard-stamp">🐰</div>
                        </div>
                        <div>
                            <div class="postcard-name">Salma <em>Yazki</em></div>
                            <div class="postcard-title">Data Analyst & Aspiring Data Engineer</div>
                        </div>
                        <div class="postcard-greeting">hi there! welcome to my page </div>
                        <div class="postcard-lines">
                            <div class="postcard-line"></div>
                            <div class="postcard-line"></div>
                        </div>
                    </div>
                </div>

                <div class="env-body">
                    <div class="env-stamp">🐰</div>
                    <div class="env-address">
                        <div class="env-address-line">To: you</div>
                        <div class="env-address-line">From: Vancouver, BC</div>
                    </div>
                </div>
                <div class="env-flap"></div>
            </div>
        </div>

        <div class="hero-scroll">scroll to explore ↓</div>
    </section>

    <script>
        setTimeout(function () {
            document.getElementById('envelope').style.overflow = 'visible';
        }, 2300);

        setTimeout(function () {
            document.querySelector('.env-flap').style.zIndex = '1';
        }, 2400);
    </script>
</body>

</html>
