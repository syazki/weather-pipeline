<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salma Yazki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&family=Caveat:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F6F0E2;
            --bg2: #EDE5CE;
            --bg3: #E4D9BE;
            --ink: #1C1810;
            --muted: #8A7860;
            --border: #D0C4A4;
            --green: #4A7A52;
            --green-l: #C4D9C8;
            --blue: #4A6E8A;
            --blue-l: #C0D0DE;
            --amber: #A86E2A;
            --amber-l: #EDD8A8;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
        }

        /* hero */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.75) saturate(0.85);
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.3) 100%);
        }

        /* nav */
        .hero-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2.5rem;
            z-index: 10;
        }

        .nav-logo {
            font-family: 'Space Mono', serif;
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.65);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.65);
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: rgba(255, 255, 255, 1);
        }

        /* scroll hint */
        .hero-scroll {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Space Mono', monospace;
            font-size: 0.52rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            animation: nudge 2s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes nudge {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(5px);
            }
        }
    </style>
</head>

<body>

    <body>

        <!-- HERO -->
        <section class="hero" id="home">
            <div class="hero-bg"></div>

            <nav class="hero-nav">
                <div class="nav-logo">Salma Yazki</div>
                <ul class="nav-links">
                    <li><a href="#about">About</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>

            <div class="envelope-wrap" id="envelopeWrap">
                <div class="click-hint" id="hint">click to open ↓</div>
                <div class="envelope" id="envelope">
                    <div class="env-body">
                        <div class="env-stamp">🌿</div>
                        <div class="env-address">
                            <div class="env-address-line">To: you</div>
                            <div class="env-address-line">From: Vancouver, BC</div>
                        </div>
                    </div>
                    <div class="env-flap"></div>
                </div>
            </div>

            <div class="hero-scroll">scroll to explore ↓</div>
        </section>

    </body>
</body>

</html>
